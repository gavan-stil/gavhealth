<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <!-- GOE Wordmark — Dune-inspired geometric letterforms -->
  <!-- Thin monoline strokes, wide spacing, geometric construction -->

  <!-- G — Nearly complete circle with gap at 2 o'clock, horizontal crossbar -->
  <g transform="translate(40, 40)">
    <!-- Circle arc (gap from ~30° to ~90° on right side) -->
    <path d="M 28 -14
             A 30 30 0 1 0 26 15"
          fill="none" stroke="#e8c47a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Horizontal crossbar from center to right -->
    <line x1="0" y1="0" x2="28" y2="0" stroke="#e8c47a" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- O — Perfect circle, thin stroke -->
  <g transform="translate(140, 40)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#e8c47a" stroke-width="1.8"/>
  </g>

  <!-- E — Three horizontal lines, no vertical bar. Middle line shorter. Decorative dot. -->
  <g transform="translate(240, 40)">
    <!-- Top line -->
    <line x1="-20" y1="-26" x2="20" y2="-26" stroke="#e8c47a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Middle line (shorter) -->
    <line x1="-20" y1="0" x2="12" y2="0" stroke="#e8c47a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Bottom line -->
    <line x1="-20" y1="26" x2="20" y2="26" stroke="#e8c47a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Decorative dot at end of middle line -->
    <circle cx="18" cy="0" r="2.5" fill="#e8c47a"/>
  </g>
</svg>