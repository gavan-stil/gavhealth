<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Strength Trends — GOE Health Mockup</title>
  <style>
    :root {
      --bg-base: #0d0d0a; --bg-card: #14130f; --bg-elevated: #1e1c17; --bg-pill: #1c1b17;
      --ochre: #d4a04a; --ochre-dim: rgba(212,160,74,0.12); --ochre-border: rgba(212,160,74,0.25);
      --text: #e8e4dc; --text-muted: #6b6760; --text-dim: #9e9b96;
      --signal-green: #4a9060; --signal-red: #a04040; --signal-blue: #4a7090;
      --radius-sm: 8px; --radius-md: 14px;
      --space-xs: 6px; --space-sm: 10px; --space-md: 14px; --space-lg: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-base); color: var(--text); font-family: -apple-system,'Inter',sans-serif;
      font-size: 14px; max-width: 390px; margin: 0 auto; padding-bottom: 80px; }
    .mono { font-family: 'JetBrains Mono','SF Mono',monospace; }

    .page-header { padding: 52px var(--space-lg) var(--space-md); display:flex; align-items:center; gap:var(--space-sm); }
    .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
    .badge { font-size:10px; font-weight:600; letter-spacing:0.5px; padding:2px 7px; border-radius:20px;
      background:var(--ochre-dim); color:var(--ochre); border:1px solid var(--ochre-border); }

    .time-range { display:flex; gap:var(--space-xs); padding:0 var(--space-lg) var(--space-lg); }
    .pill { flex:1; text-align:center; padding:8px; border-radius:10px; font-size:13px; font-weight:500;
      background:var(--bg-pill); color:var(--text-muted); cursor:pointer; border:1px solid transparent; transition:all 0.15s; }
    .pill.active { background:var(--ochre-dim); color:var(--ochre); border-color:var(--ochre-border); }

    .section-label { font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase;
      color:var(--text-muted); padding:var(--space-lg) var(--space-lg) var(--space-sm); }

    /* ── Recovery (real data) ─────────────────── */
    .recovery-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-sm); padding:0 var(--space-md) var(--space-md); }
    .rec-card { background:var(--bg-card); border-radius:var(--radius-md); padding:var(--space-sm) var(--space-md);
      border:1px solid rgba(255,255,255,0.04); }
    .rec-label { font-size:10px; font-weight:600; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:4px; }
    .rec-val { font-size:20px; font-weight:700; font-family:monospace; line-height:1.1; }
    .rec-unit { font-size:11px; color:var(--text-muted); }
    .rec-change { font-size:11px; margin-top:2px; }
    .rec-change.up { color:var(--signal-green); }
    .rec-change.down { color:var(--signal-red); }
    .rec-change.neutral { color:var(--text-muted); }
    .rec-card svg { display:block; margin-top:6px; overflow:visible; }
    .rec-card.loading .rec-val { color:var(--text-muted); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

    /* ── Metric toggles ───────────────────────── */
    .metric-toggles { display:flex; gap:6px; flex-wrap:wrap; padding:0 var(--space-md) var(--space-sm); }
    .metric-pill { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500;
      background:var(--bg-pill); color:var(--text-muted); cursor:pointer; border:1px solid transparent;
      transition:all 0.15s; user-select:none; }
    .metric-pill.active { background:var(--ochre-dim); color:var(--ochre); border-color:var(--ochre-border); }
    .metric-pill.blue.active { background:rgba(74,112,144,0.15); color:#6aabce; border-color:rgba(74,112,144,0.3); }

    /* ── Workout volume chart (scrollable) ───── */
    .chart-wrap { margin:0 var(--space-md) var(--space-xs); background:var(--bg-card);
      border-radius:var(--radius-md); padding:var(--space-md); border:1px solid rgba(255,255,255,0.04); }
    .chart-breadcrumb { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted);
      margin-bottom:var(--space-sm); min-height:20px; }
    .crumb-active { color:var(--text); font-weight:600; }
    .back-btn { background:var(--bg-elevated); border:none; color:var(--ochre); font-size:12px;
      padding:3px 10px; border-radius:6px; cursor:pointer; display:none; }
    .back-btn.visible { display:inline-block; }
    .y-hint { font-size:9px; color:var(--text-muted); font-family:monospace; text-align:right; margin-bottom:4px; }

    .chart-scroll-outer { overflow-x:auto; scrollbar-width:none; margin:0 -14px; padding:0 14px 8px; }
    .chart-scroll-outer::-webkit-scrollbar { display:none; }
    .bar-chart { display:flex; align-items:flex-end; gap:4px; height:120px; padding-top:16px;
      position:relative; min-width:max-content; }

    .bar-group { display:flex; flex-direction:column; align-items:center; gap:3px;
      cursor:pointer; position:relative; width:28px; flex-shrink:0; }
    .bar-group:hover .bar-fill { opacity:0.9; }
    .bar-fill { width:100%; border-radius:4px 4px 0 0; background:var(--ochre); opacity:0.7;
      transition:opacity 0.15s; min-height:4px; }
    .bar-fill.active { opacity:1; box-shadow:0 0 0 2px var(--ochre-border); }
    .bar-fill.blue { background:#4a7090; opacity:0.6; }
    .bar-spacer { flex:1; }

    .bar-label-wrap { text-align:center; }
    .bar-label { font-size:9px; color:var(--text-muted); font-family:monospace; white-space:nowrap; }
    .bar-month { font-size:8px; color:var(--ochre); font-weight:700; height:10px; line-height:10px; }
    .bar-month-gap { height:10px; }

    /* month separator line */
    .month-sep { position:absolute; top:0; bottom:20px; width:1px;
      background:rgba(212,160,74,0.2); pointer-events:none; }

    /* session chips */
    .session-chips { display:none; gap:4px; margin-top:var(--space-md); flex-wrap:wrap; }
    .session-chips.visible { display:flex; }
    .session-chip { background:var(--bg-elevated); border:1px solid rgba(255,255,255,0.06);
      border-radius:8px; padding:6px 10px; font-size:11px; cursor:pointer; transition:all 0.15s;
      flex:1; min-width:60px; text-align:center; }
    .session-chip:hover { border-color:var(--ochre-border); }
    .session-chip.selected { border-color:var(--ochre); background:var(--ochre-dim); }
    .chip-date { color:var(--text-dim); font-size:10px; }
    .chip-val { color:var(--text); font-weight:600; font-family:monospace; font-size:12px; }

    /* session detail */
    .session-detail { display:none; margin-top:var(--space-md); padding-top:var(--space-md);
      border-top:1px solid rgba(255,255,255,0.06); }
    .session-detail.visible { display:block; }
    .sdh { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:var(--space-sm); }
    .sdh .title { font-size:13px; font-weight:600; }
    .sdh .sub { font-size:11px; color:var(--text-muted); }
    .stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-xs); margin-bottom:var(--space-sm); }
    .stat-box { background:var(--bg-elevated); border-radius:var(--radius-sm); padding:8px; text-align:center; }
    .stat-box .sv { font-size:15px; font-weight:700; font-family:monospace; color:var(--ochre); }
    .stat-box .sk { font-size:10px; color:var(--text-muted); margin-top:2px; }
    .exercise-list { display:flex; flex-direction:column; gap:4px; }
    .exercise-row { display:flex; justify-content:space-between; align-items:center;
      padding:6px 8px; background:var(--bg-elevated); border-radius:var(--radius-sm); font-size:12px; }
    .exercise-row .ex-name { color:var(--text); }
    .exercise-row .ex-sets { color:var(--text-muted); font-family:monospace; }
    .exercise-row .ex-load { color:var(--ochre); font-weight:600; font-family:monospace; }

    /* ── Exercise progress ───────────────────── */
    .cat-filter { display:flex; gap:6px; overflow-x:auto; padding:0 var(--space-md) var(--space-sm);
      scrollbar-width:none; }
    .cat-filter::-webkit-scrollbar { display:none; }
    .cat-pill { padding:5px 14px; border-radius:20px; font-size:12px; font-weight:500; white-space:nowrap;
      background:var(--bg-pill); color:var(--text-muted); cursor:pointer; border:1px solid transparent;
      transition:all 0.15s; user-select:none; flex-shrink:0; }
    .cat-pill.active { background:var(--ochre-dim); color:var(--ochre); border-color:var(--ochre-border); }

    .exercise-cards { display:flex; flex-direction:column; gap:var(--space-sm); padding:0 var(--space-md); }
    .ex-card { background:var(--bg-card); border-radius:var(--radius-md); padding:var(--space-md);
      border:1px solid rgba(255,255,255,0.04); }
    .ex-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:var(--space-sm); }
    .ex-name-big { font-size:15px; font-weight:700; }
    .ex-cat-tag { font-size:10px; font-weight:600; letter-spacing:0.4px; padding:2px 7px; border-radius:10px;
      background:var(--bg-elevated); color:var(--text-muted); }
    .ex-pr { font-size:11px; font-family:monospace; font-weight:600; }
    .ex-pr.up { color:var(--signal-green); }
    .ex-pr.neutral { color:var(--text-muted); }
    .ex-stats-row { display:flex; gap:var(--space-md); margin-bottom:var(--space-sm); flex-wrap:wrap; }
    .ex-stat { font-size:12px; color:var(--text-dim); }
    .ex-stat span { color:var(--text); font-weight:600; }
    .chart-sublabel { font-size:10px; color:var(--text-muted); margin-bottom:4px; }
    .load-bar-row { display:flex; gap:4px; align-items:flex-end; height:40px; margin-top:var(--space-sm); }
    .lbg { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .lbf { width:100%; background:rgba(212,160,74,0.25); border-radius:3px 3px 0 0; }
    .lbf.cur { background:var(--ochre); opacity:0.8; }
    .lb-label { font-size:9px; color:var(--text-muted); font-family:monospace; }

    /* ── Tab bar ─────────────────────────────── */
    .tab-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:390px;
      background:rgba(13,13,10,0.92); backdrop-filter:blur(12px); border-top:1px solid rgba(255,255,255,0.06);
      display:flex; padding:8px 0 20px; }
    .tab-item { flex:1; text-align:center; font-size:10px; color:var(--text-muted); padding:4px; }
    .tab-item.active { color:var(--ochre); }
    .tab-icon { font-size:20px; margin-bottom:2px; }
  </style>
</head>

function renderWeekly() {
  const mc = metricConfig[activeMetric];
  document.getElementById('yHint').textContent = mc.label;
  document.getElementById('breadcrumbText').textContent = `${weeklyTotals.length} weeks`;
  document.getElementById('backBtn').classList.remove('visible');
  document.getElementById('sessionChips').classList.remove('visible');
  document.getElementById('sessionDetail').classList.remove('visible');

  const vals = weeklyTotals.map(w => w[mc.key]);
  const max = Math.max(...vals);
  const chart = document.getElementById('mainChart');
  chart.innerHTML = '';

  weeklyTotals.forEach((w, i) => {
    const h = max > 0 ? Math.max(Math.round((w[mc.key] / max) * 96), 4) : 4;
    const prevMonth = i > 0 ? weeklyTotals[i-1].month : null;
    const showMonth = w.month !== prevMonth;

    const group = document.createElement('div');
    group.className = 'bar-group';
    group.title = `${w.label} ${w.month}: ${mc.fmt(w[mc.key])}`;
    group.innerHTML = `
      <div class="bar-spacer"></div>
      <div class="bar-fill${mc.isBlue ? ' blue' : ''}" style="height:${h}px"></div>
      <div class="bar-label-wrap">
        <div class="bar-label">${w.label}</div>
        ${showMonth ? `<div class="bar-month">${w.month}</div>` : '<div class="bar-month-gap"></div>'}
      </div>`;
    group.addEventListener('click', () => drillIntoWeek(i));
    chart.appendChild(group);
  });
  drillWeekIdx = null;
}

function drillIntoWeek(weekIdx) {
  drillWeekIdx = weekIdx;
  const week = weeklyTotals[weekIdx];
  const mc = metricConfig[activeMetric];

  document.getElementById('breadcrumbText').textContent = `${week.label} ${week.month} — ${week.sessions.length} sessions`;
  document.getElementById('backBtn').classList.add('visible');
  document.getElementById('sessionDetail').classList.remove('visible');

  const vals = week.sessions.map(s => s[mc.key] || 0);
  const max = Math.max(...vals, 1);
  const chart = document.getElementById('mainChart');
  chart.innerHTML = '';

  week.sessions.forEach((s, i) => {
    const val = s[mc.key] || 0;
    const h = Math.max(Math.round((val / max) * 96), 4);
    const group = document.createElement('div');
    group.className = 'bar-group';
    group.style.width = '36px';
    const shortDate = s.date.split(' ').map((p,j) => j===0 ? p.slice(0,3) : p).join(' ');
    group.innerHTML = `
      <div class="bar-spacer"></div>
      <div class="bar-fill${mc.isBlue ? ' blue' : ''}" id="sbar${i}" style="height:${h}px"></div>
      <div class="bar-label-wrap">
        <div class="bar-label">${shortDate}</div>
        <div class="bar-month-gap"></div>
      </div>`;
    group.addEventListener('click', () => selectSession(weekIdx, i));
    chart.appendChild(group);
  });

  const chips = document.getElementById('sessionChips');
  chips.innerHTML = '';

  week.sessions.forEach((s, i) => {

    chip.addEventListener('click', () => selectSession(weekIdx, i));
    chips.appendChild(chip);
  });
}

  const hrStr = session.avghr ? `${session.avghr} bpm` : '—';

// ── Recovery: fetch real data ───────────────────────────────────────────────
function makeSpark(data, valFn, elId, color = '#d4a04a') {
  const card = document.getElementById(elId);
  if (!card || !data || data.length === 0) return;
  card.classList.remove('loading');

  const vals = data.map(valFn).filter(v => v != null && !isNaN(v));
  if (vals.length < 2) return;

  const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const W = 150, H = 36;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * W;
    const y = H - ((v - mn) / rng) * (H - 8) - 4;
    return `${x},${y}`;
  }).join(' ');

  const svg = card.querySelector('svg');
  if (svg) svg.innerHTML = `
    <polyline fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" points="${pts}"/>
    <circle cx="${W}" cy="${H - ((vals[vals.length-1]-mn)/rng)*(H-8) - 4}" r="2.5" fill="${color}"/>`;

  const latest = vals[vals.length - 1];
  const prev7  = vals.length > 7 ? vals.slice(-8,-1).reduce((a,b)=>a+b,0)/(vals.length > 8 ? 7 : vals.slice(-8,-1).length) : latest;
  const diff   = latest - prev7;
  const pct    = prev7 > 0 ? Math.round(Math.abs(diff / prev7) * 100) : 0;
  const changeEl = card.querySelector('.rec-change');
  if (changeEl && pct > 0) {
    const better = elId === 'rc-rhr' ? diff < 0 : diff > 0; // lower RHR = better
    changeEl.className = `rec-change ${better ? 'up' : 'down'}`;
    changeEl.textContent = `${diff > 0 ? '+' : ''}${elId === 'rc-weight' ? diff.toFixed(1)+'kg' : pct+'%'} vs 7d avg`;
  } else if (changeEl) {
    changeEl.className = 'rec-change neutral';
    changeEl.textContent = 'stable';
  }
  return latest;
}

async function fetchRecovery() {
  try {
    const [sleepRes, rhrRes, weightRes] = await Promise.all([
      fetch(`${API_BASE}/api/sleep?days=90`,  { headers: { 'X-API-Key': API_KEY } }),
      fetch(`${API_BASE}/api/rhr?days=90`,    { headers: { 'X-API-Key': API_KEY } }),
      fetch(`${API_BASE}/api/weight?days=90`, { headers: { 'X-API-Key': API_KEY } }),
    ]);

    const [sleepData, rhrData, weightData] = await Promise.all([
      sleepRes.json(), rhrRes.json(), weightRes.json()
    ]);

    // Sleep — sort asc for sparkline
    const sleep = (sleepData.data || sleepData || []).slice().sort((a,b) => a.date > b.date ? 1 : -1);
    const sleepLatest = makeSpark(sleep, d => d.duration_hrs ?? d.total_sleep_hrs, 'rc-sleep');
    if (sleepLatest != null) {
      document.querySelector('#rc-sleep .rec-val').innerHTML = `${sleepLatest.toFixed(1)}<span class="rec-unit">h</span>`;
    }

    // Deep % — derived from deep_sleep_hrs / total_sleep_hrs or direct deep_pct
    const deepLatest = makeSpark(sleep, d => {
      if (d.deep_pct != null) return d.deep_pct;
      if (d.deep_sleep_hrs != null && d.total_sleep_hrs) return Math.round((d.deep_sleep_hrs / d.total_sleep_hrs) * 100);
      return null;
    }, 'rc-deep');
    if (deepLatest != null) {
      document.querySelector('#rc-deep .rec-val').innerHTML = `${Math.round(deepLatest)}<span class="rec-unit">%</span>`;
    }

    // RHR
    const rhr = (rhrData.data || rhrData || []).slice().sort((a,b) => (a.date||a.log_date) > (b.date||b.log_date) ? 1 : -1);
    const rhrLatest = makeSpark(rhr, d => d.rhr_bpm, 'rc-rhr');
    if (rhrLatest != null) {
      document.querySelector('#rc-rhr .rec-val').innerHTML = `${Math.round(rhrLatest)}<span class="rec-unit">bpm</span>`;
    }

    // Weight
    const weight = (weightData.data || weightData || []).slice().sort((a,b) => (a.date||a.recorded_at) > (b.date||b.recorded_at) ? 1 : -1);
    const wLatest = makeSpark(weight, d => d.weight_kg, 'rc-weight');
    if (wLatest != null) {
      document.querySelector('#rc-weight .rec-val').innerHTML = `${wLatest.toFixed(1)}<span class="rec-unit">kg</span>`;
    }

  } catch (err) {
    console.error('Recovery fetch failed:', err);
    ['rc-sleep','rc-deep','rc-rhr','rc-weight'].forEach(id => {
      const card = document.getElementById(id);
      if (card) {
        card.classList.remove('loading');
        const ch = card.querySelector('.rec-change');
        if (ch) { ch.className = 'rec-change neutral'; ch.textContent = 'offline'; }
      }
    });
  }
}

// ── Init ────────────────────────────────────────────────────────────────────
renderWeekly();
renderExercises();
fetchRecovery();
</script>
</body>
</html>
